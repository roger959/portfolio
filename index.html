<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roger Junior Lumbala | Portfolio</title>
    <link rel="stylesheet" href="all/all.css">

    <!-- Lottie Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.9.6/lottie.min.js"></script>


</head>
<body>
    <!-- Canvas pour les particules (plein écran, pointer-events: none) -->
    <canvas id="particles-canvas"></canvas>

    <!-- Conteneur centré pour Lottie + bouton -->
    <main class="centered-content" role="main" aria-labelledby="hero-title">
        <section class="hero-card">
            <div class="hero-copy">
                <h1 id="hero-title" class="hero-name">
                    <span>Roger</span>
                    <span>Junior Lumbala</span>
                </h1>
                <p class="hero-role">Etudiant en BTS SIO SLAM</p>

                <div class="center-controls hero-actions">
                    <a href="portfolio.html" id="start-button">Entrer dans le portfolio</a>
                </div>
            </div>

            <div class="hero-visual">
                <div id="lottie-animation" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <!-- (Optionnel) compteur ou autre éléments -->
    <div class="count-particles" aria-hidden="true" style="display:none;">
        <span class="js-count-particles">--</span>
    </div>

    <!-- Script principal -->
    <script src="all/all.js"></script>
</body>
</html>
