    <style>
        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }

        .card {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 30%),
                linear-gradient(180deg, rgba(15, 24, 40, 0.94), rgba(7, 11, 21, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            width: 300px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
            text-align: center;
            backdrop-filter: blur(14px);
            transition: all 0.3s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 22%),
                radial-gradient(circle at top right, rgba(0, 212, 255, 0.18), transparent 30%);
            pointer-events: none;
        }

        .card h2 {
            color: #ffffff;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: #e0e0e0;
            position: relative;
            z-index: 1;
        }

        .card a.btn {
            display: inline-block;
            background-color: #00d4ff;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .card:hover {
            transform: none;
            border-color: rgba(137, 219, 255, 0.24);
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.34), 0 0 28px rgba(0, 212, 255, 0.1);
        }

        .card a.btn:hover {
            background-color: #00b8e6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
